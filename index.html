<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦸 英雄作业计时器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1E3A5F; --bg2: #0F2744;
      --green: #10B981; --green-dark: #059669;
      --red: #F87171; --red-dark: #EF4444;
      --blue: #06B6D4; --槽底: rgba(30,58,95,0.6);
      --purple-deep: #FCD34D; --purple-mid: #FBBF24;
      --gold: #FBBF24; --text: #F8FAFC; --white: #FFFFFF;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', cursive, sans-serif;
      background: url('https://raw.githubusercontent.com/k-goz/hero-timer-king/main/background.jpg') center center / cover no-repeat fixed;
      color: var(--text);
      overflow-x: hidden;
    }
    body {
      /* 主内容自然文档流，配合 .container 的 justify-content: center 居中 */
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.35);
      pointer-events: none; z-index: 0;
    }
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px 16px 40px; gap: 20px;
      /* 容器占满全屏，内容在视口正中央 */
      width: 100%;
    }
    /* === 左侧日期时间栏（fixed，不影响主内容） === */
    .sidebar {
      width: 120px;
      position: fixed;
      left: 0; top: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 8px;
      gap: 12px;
      z-index: 2;
    }
    .date-card {
      background: rgba(15,23,42,0.7);
      border: 2px solid rgba(251,191,36,0.6);
      border-radius: 20px;
      padding: 12px 8px;
      width: 108px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(245,158,11,0.3), inset 0 1px 0 rgba(255,255,255,0.6);
      position: relative;
    }
    .date-card::before {
      content: '🌟';
      position: absolute;
      top: -10px; left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
    }
    .date-weekday {
      font-size: 13px;
      font-weight: bold;
      color: #D97706;
      margin-bottom: 2px;
      letter-spacing: 0.5px;
    }
    .date-month {
      font-size: 11px;
      color: #92400E;
      opacity: 0.8;
    }
    .date-day {
      font-size: 36px;
      font-weight: bold;
      color: #B45309;
      line-height: 1;
      margin: 4px 0 2px;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    }
    .date-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #F59E0B, transparent);
      border-radius: 1px;
      margin: 2px 0;
    }
    .date-year {
      font-size: 10px;
      color: #B45309;
      opacity: 0.7;
    }
    .time-card {
      background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%);
      border: 2.5px solid #3B82F6;
      border-radius: 20px;
      padding: 12px 8px;
      width: 108px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.6);
      position: relative;
    }
    .time-card::before {
      content: '⏰';
      position: absolute;
      top: -10px; left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
    }
    .time-value {
      font-size: 26px;
      font-weight: bold;
      color: #1D4ED8;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      line-height: 1;
      margin: 4px 0;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    }
    .time-seconds {
      font-size: 14px;
      color: #3B82F6;
      font-weight: bold;
    }
    .time-label {
      font-size: 10px;
      color: #1E40AF;
      opacity: 0.7;
    }
    .time-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #3B82F6, transparent);
      border-radius: 1px;
      margin: 2px 0;
    }
    .time-ampm {
      font-size: 11px;
      color: #1E40AF;
      font-weight: bold;
    }
    .sidebar-deco {
      font-size: 28px;
      animation: float 3s ease-in-out infinite;
    }
    .sidebar-deco:nth-child(4) { animation-delay: 0.5s; }
    .sidebar-deco:nth-child(6) { animation-delay: 1s; }
    .sidebar-deco:nth-child(8) { animation-delay: 1.5s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px rgba(59,130,246,0.3); }
      50% { box-shadow: 0 0 16px rgba(59,130,246,0.6); }
    }
    .header { text-align: center; }
    .header h1 {
      font-size: clamp(28px, 7vw, 48px);
      color: var(--purple-deep);
      text-shadow: 2px 3px 0 #e9d5ff;
      line-height: 1.2;
    }
    .header .subtitle {
      font-size: clamp(12px, 3vw, 16px);
      color: var(--purple-mid); margin-top: 4px; opacity: 0.8;
    }
    .timer-display {
      font-size: clamp(32px, 9vw, 56px);
      color: var(--purple-deep); font-weight: bold;
      letter-spacing: 3px; min-height: 60px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.3s, transform 0.3s;
    }
    .timer-display.show { opacity: 1; transform: scale(1); }
    .btn-area {
      display: flex; align-items: center; gap: 16px;
    }
    .cheer-text {
      font-size: clamp(20px, 5vw, 32px);
      font-weight: bold;
      color: var(--gold);
      text-shadow: 2px 2px 0 rgba(245,158,11,.3);
      opacity: 0;
      transition: opacity 0.3s;
      min-width: 70px;
      text-align: center;
    }
    .cheer-text.show { opacity: 1; }
    .main-btn {
      width: clamp(160px, 45vw, 200px);
      height: clamp(160px, 45vw, 200px);
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,.5);
      font-family: inherit;
      font-size: clamp(18px, 4.5vw, 26px);
      font-weight: bold; color: white;
      cursor: pointer; outline: none;
      box-shadow: 0 6px 24px rgba(0,0,0,.15);
      transition: transform .15s;
      user-select: none;
    }
    .main-btn.green {
      background: radial-gradient(circle at 35% 35%, #34D399, #10B981 60%, #059669);
      animation: pulse-green 2s ease-in-out infinite;
    }
    .main-btn.red {
      background: radial-gradient(circle at 35% 35%, #FCA5A5, #EF4444 60%, #DC2626);
      animation: pulse-red 1s ease-in-out infinite;
    }
    .main-btn.disabled { background: var(--槽底); animation: none; cursor: not-allowed; }
    .main-btn:hover:not(.disabled) { transform: scale(1.05); }
    .main-btn:active:not(.disabled) { transform: scale(0.95); }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 6px 24px rgba(34,197,94,.4); }
      50% { box-shadow: 0 6px 32px rgba(34,197,94,.6), 0 0 0 12px rgba(34,197,94,0); }
    }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 6px 24px rgba(239,68,68,.4); }
      50% { box-shadow: 0 6px 32px rgba(239,68,68,.6), 0 0 0 10px rgba(239,68,68,0); }
    }
    .energy-section { width: 100%; max-width: 400px; text-align: center; }
    .energy-label {
      font-size: clamp(14px, 3.5vw, 18px);
      color: var(--purple-deep); margin-bottom: 8px; font-weight: bold;
    }
    .energy-bar {
      display: flex; gap: 5px; height: 42px;
      background: var(--槽底); border-radius: 21px; padding: 5px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,.1);
    }
    .energy-cell {
      flex: 1; border-radius: 16px; background: #E2E8F0;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .energy-cell.full {
      background: linear-gradient(180deg, #22D3EE, #06B6D4);
      box-shadow: 0 0 10px rgba(59,130,246,.5);
    }
    .energy-count {
      margin-top: 6px; font-size: clamp(13px, 3vw, 16px);
      color: var(--blue); font-weight: bold;
    }
    .energy-history {
      margin-top: 10px;
      font-size: clamp(11px, 2.5vw, 14px);
      color: var(--purple-mid);
      min-height: 18px;
    }
    .hint {
      font-size: 16px;
      color: #FCD34D;
      text-align: center;
      margin-top: 6px;
      padding: 8px 16px;
      background: rgba(251,191,36,0.15);
      border-radius: 20px;
      border: 1px solid rgba(251,191,36,0.3);
      animation: hintPulse 2s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }
    .best-time {
      font-size: clamp(12px, 3vw, 16px);
      color: var(--gold); text-align: center; font-weight: bold;
      min-height: 20px;
    }
    /* Toast */
    .toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px);
      background: var(--purple-deep); color: white;
      padding: 14px 28px; border-radius: 14px;
      font-size: 18px; z-index: 9999;
      box-shadow: 0 6px 20px rgba(107,33,168,.4);
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; max-width: 90vw;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--red); box-shadow: 0 6px 20px rgba(239,68,68,.4); }
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(3px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(15,23,42,0.92);
      border-radius: 20px; padding: 28px 20px;
      width: min(420px, 100%);
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 50px rgba(107,33,168,.25);
      transform: scale(0.85);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      border: 2px solid rgba(251,191,36,0.5);
    }
    .modal-overlay.show .modal { transform: scale(1); }
    .modal-title {
      text-align: center;
      font-size: clamp(22px, 5vw, 32px);
      color: #FCD34D; margin-bottom: 6px;
    }
    .modal-body { text-align: center; }
    .modal p { font-size: clamp(16px, 4vw, 20px); color: #E2E8F0; margin-bottom: 16px; }
    .pwd-input {
      width: 100%; max-width: 200px;
      font-size: 28px; text-align: center;
      border: 2px solid rgba(251,191,36,0.5);
      border-radius: 12px; padding: 10px;
      font-family: inherit; outline: none;
      color: #1E293B; background: #FCD34D;
    }
    .pwd-input:focus { border-color: var(--gold); }
    .result-time {
      font-size: clamp(36px, 9vw, 52px);
      color: var(--gold); font-weight: bold;
      margin: 8px 0;
    }
    .trophy-icon {
      font-size: clamp(50px, 12vw, 70px);
      display: block; margin: 12px auto;
      animation: bounce 0.6s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-8px); }
    }
    /* Leaderboard */
    .leaderboard { margin: 16px 0; list-style: none; }
    .leaderboard li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 10px;
      margin-bottom: 6px; font-size: clamp(14px, 3.5vw, 18px);
      background: #f5f3ff;
    }
    .leaderboard li.user-row {
      background: #FEF9C3; border: 2px solid var(--gold);
      font-weight: bold;
    }
    .lb-rank { font-size: 18px; font-weight: bold; min-width: 32px; text-align: center; }
    .lb-1 .lb-rank { color: #D97706; }
    .lb-2 .lb-rank { color: #6B7280; }
    .lb-3 .lb-rank { color: #B45309; }
    .lb-name { flex: 1; text-align: center; min-width: 100px; }
    .lb-time { min-width: 72px; text-align: right; font-variant-numeric: tabular-nums; }
    .lb-time { font-size: 0.8em; color: var(--purple-mid); }
    /* Prize */
    .prize-badge {
      font-size: clamp(60px, 18vw, 90px);
      display: block; text-align: center; margin: 12px 0;
      animation: spin-prize 0.8s ease;
    }
    @keyframes spin-prize {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .prize-text {
      text-align: center;
      font-size: clamp(18px, 4.5vw, 26px);
      color: var(--purple-deep); line-height: 1.5;
      margin: 10px 0 16px;
    }
    /* Grand Prize Summary */
    .grand-summary {
      background: linear-gradient(135deg, #FEF9C3, #FDE68A);
      border-radius: 16px; padding: 16px;
      margin: 16px 0;
    }
    .grand-summary-title {
      font-size: clamp(16px, 4vw, 20px);
      color: var(--purple-deep); font-weight: bold;
      margin-bottom: 8px;
    }
    .grand-total-time {
      font-size: clamp(24px, 6vw, 32px);
      color: var(--gold); font-weight: bold;
    }
    .grand-rank-text {
      font-size: clamp(14px, 3.5vw, 18px);
      color: var(--purple-mid); margin-top: 6px;
    }
    /* Buttons */
    .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
    .btn {
      font-family: inherit;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: bold;
      padding: 12px 28px;
      border: none; border-radius: 14px;
      cursor: pointer;
      transition: transform .15s;
    }
    .btn:hover { transform: scale(1.04); }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--green); color: white; box-shadow: 0 4px 12px rgba(34,197,94,.4); }
    .btn-secondary { background: var(--槽底); color: var(--text); }
    /* Confetti canvas */
  </style>
</head>

<div class="toast" id="toast"></div>

<!-- 左侧日期时间栏 -->
  <div class="sidebar" id="sidebar">

<div class="container">
  <div class="header">
    <h1>🦸 英雄作业计时器 🏆</h1>

  <div class="best-time" id="bestTimeDisplay"></div>

</div>

<!-- Result Modal -->
<div class="modal-overlay" id="resultOverlay">
  <div class="modal">
    <div class="modal-title">🎉 挑战完成！</div>
    <div class="modal-body">
      <span class="trophy-icon">🏆</span>
      <div style="font-size:14px;color:var(--purple-mid);">你的用时</div>
      <div class="result-time" id="resultTimeText">00:00</div>
      <ul class="leaderboard" id="leaderboardList"></ul>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="closeResult()">太棒了！👍</button>
      </div>
    </div>
  </div>
</div>

<!-- Grand Prize Modal -->
<div class="modal-overlay" id="grandPrizeOverlay">
  <div class="modal">
    <div class="modal-title">🎖️ 超级大奖！</div>
    <div class="modal-body">
      <div class="grand-summary">
        <div class="grand-summary-title">📊 五次挑战总结</div>
        <div class="grand-total-time" id="grandTotalTime">00:00</div>
        <div class="grand-rank-text" id="grandRankText">你是第 X 名小英雄！</div>
      </div>
      <span class="prize-badge">🏅</span>
      <p class="prize-text">恭喜！能量水槽满啦！<br/>找爸爸兑换一次动画片奖励！🎬</p>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="closeGrandPrize()">太好啦！🎉</button>
      </div>
    </div>
  </div>
</div>

<script>

// === 配置 ===

// === 音频对象 ===
const audioFiles = {
  start: VOICE_DIR + "let's go.mp3",
  complete1: VOICE_DIR + "ye.mp3",
  complete2: VOICE_DIR + "dangdang.mp3",
  complete3: VOICE_DIR + "good.mp3",
  complete4: VOICE_DIR + "great.mp3",
  complete5: VOICE_DIR + "wonner2.mp3",
  grandPrize: VOICE_DIR + "wonner.mp3"
};

// 预加载音频
const audioMap = {};
Object.entries(audioFiles).forEach(([key, path]) => {
  audioMap[key] = new Audio(path);
  audioMap[key].preload = 'auto';
});

function playSound(key) {
  if (audioMap[key]) {
    audioMap[key].currentTime = 0;
    audioMap[key].play().catch(e => console.log('Audio play failed:', e));
  }
}

// === 彩纸屑效果 ===
const confettiPieces = [];
let confettiAnimating = false;

function createConfetti(count) {
  // 创建 canvas 如果不存在
  let canvas = document.getElementById('confettiCanvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'confettiCanvas';
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;';
    document.body.appendChild(canvas);
  }
  
  // 设置 canvas 尺寸
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  // 清空之前的彩纸屑
  confettiPieces.length = 0;
  
  // 生成彩纸屑
  const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA', '#FCBAD3', '#A8D8EA'];
  
  for (let i = 0; i < count; i++) {
    confettiPieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      size: 6 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      speedY: 2 + Math.random() * 4,
      speedX: (Math.random() - 0.5) * 4,
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 10
    });
  }
  
  // 开始动画
  if (!confettiAnimating) {
    confettiAnimating = true;
    animateConfetti();
  }
}

function animateConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  let activeCount = 0;
  
  confettiPieces.forEach(p => {
    p.y += p.speedY;
    p.x += p.speedX;
    p.rotation += p.rotationSpeed;
    p.speedY += 0.1; // 重力
    
    if (p.y < canvas.height + 50) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx.restore();
      activeCount++;
    }
  });
  
  if (activeCount > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiAnimating = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

// === 左侧日期时间实时更新（北京时间，UTC+8） ===
function updateSidebarClock() {
  // 用 UTC + 8小时偏移量，避免依赖系统时区配置
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const beijingMs = utc + (8 * 3600000);
  const bj = new Date(beijingMs);

  const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

  const weekday = weekdays[bj.getDay()];
  const day = bj.getDate();
  const month = months[bj.getMonth()];
  const year = bj.getFullYear();
  const hours = String(bj.getHours()).padStart(2, '0');
  const minutes = String(bj.getMinutes()).padStart(2, '0');
  const seconds = String(bj.getSeconds()).padStart(2, '0');

  const el = (id) => document.getElementById(id);
  if (el('dateWeekday')) el('dateWeekday').textContent = weekday;
  if (el('dateDay')) el('dateDay').textContent = day;
  if (el('dateMonth')) el('dateMonth').textContent = month;
  if (el('dateYear')) el('dateYear').textContent = year;
  if (el('sidebarTime')) el('sidebarTime').textContent = hours + ':' + minutes;
  if (el('sidebarSeconds')) el('sidebarSeconds').textContent = seconds;
}

// === 排行榜算法（真实随机） ===
function generateLeaderboard(userTime) {
  // 随机选5个真实名字
  const shuffled = [...REAL_NAMES].sort(() => Math.random() - 0.5);
  const selectedNames = shuffled.slice(0, 5);
  
  // 为每个名字生成与用户时间相近的随机时间
  const robots = selectedNames.map((name, idx) => {
    // 时间在用户时间的 -30秒 到 +90秒 之间随机
    let time = userTime + Math.floor(Math.random() * 120) - 30;
    if (time < 10) time = 10 + Math.floor(Math.random() * 20);
    return { name: name, time: time, isUser: false };
  });
  
  // 按时间排序
  robots.sort((a, b) => a.time - b.time);
  
  // 找到插入位置（确保前3名）
  let insertIndex = robots.findIndex(r => r.time > userTime);
  if (insertIndex === -1) insertIndex = robots.length;
  
  // 确保在前3名
  if (insertIndex > 2) insertIndex = Math.floor(Math.random() * 3);
  
  // 插入用户
  const userEntry = { name: '🦸 我', time: userTime, isUser: true };
  robots.splice(insertIndex, 0, userEntry);
  
  // 重新排序（因为用户插入后可能打乱顺序）
  robots.sort((a, b) => a.time - b.time);
  
  return robots.slice(0, 5);
}

function renderLeaderboard(leaderboard) {
  leaderboardList.innerHTML = '';
  leaderboard.forEach((entry, idx) => {
    const li = document.createElement('li');
    li.className = entry.isUser ? 'user-row' : '';
    if (idx < 3) li.classList.add(`lb-${idx + 1}`);
    
    const timeStr = formatTime(entry.time);
    
    li.innerHTML = `
      <span class="lb-rank">${idx + 1}</span>
      <span class="lb-name">${entry.name}</span>
      <span class="lb-time">${timeStr}</span>
    `;
    leaderboardList.appendChild(li);
  });
}

function formatTime(seconds) {
  const min = Math.floor(seconds / 60);
  const sec = seconds % 60;
  if (min > 0) return `${min}分${sec}秒`;
  return `${sec}秒`;
}


// === 数据存储 ===
function saveBestTime(seconds) {
  const best = localStorage.getItem('heroBestTime');
  if (!best || seconds < parseInt(best)) {

}

function addEnergy(seconds) {
  const history = JSON.parse(localStorage.getItem('energyHistory') || '[]');
  history.push({ time: seconds, completedAt: new Date().toISOString() });
  localStorage.setItem('energyHistory', JSON.stringify(history));
  updateEnergyBar();
  
  // 检查当前周期是否满5槽（history.length % 5 === 0 表示刚完成一个周期）
  if (history.length % 5 === 0 && history.length > 0) {
    pendingGrandPrize = true;
  }
}

function incrementChallenges() {
  let count = parseInt(localStorage.getItem('challengeCount') || '0');
  count++;
  localStorage.setItem('challengeCount', count);
}

function updateEnergyBar() {
  const history = JSON.parse(localStorage.getItem('energyHistory') || '[]');
  // 当前周期已完成的数量（0-4）
  const currentCount = history.length % 5;
  
  const slots = document.querySelectorAll('.energy-cell');
  slots.forEach((slot, idx) => {
    slot.classList.toggle('full', idx < currentCount);
  });
  
  // 更新能量计数显示
  if (energyCount) {
    energyCount.textContent = `能量: ${currentCount} / 5`;
  }
}
